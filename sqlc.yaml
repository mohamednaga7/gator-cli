version: "2"
sql:
  - schema: "sql/schema"
    queries: "sql/queries"
    engine: "postgresql"
    gen:
      go:
        out: "internal/database"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            nullable: true
            go_type: "*github.com/google/uuid.UUID"
          - db_type: "text"
            nullable: true
            go_type: "string"
          - db_type: "varchar"
            nullable: true
            go_type: "string"